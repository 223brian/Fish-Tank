<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Aquarium Dashboard</title>

		<link rel="stylesheet" href="css/main.css">

		<!-- font awesome import -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
	</head>
	<body>
		<header>
			<h1>Fish Tank Monitor</h1>
			<a href="https://github.com/Insane-Owl/Fish-Tank" target="_blank" title="See The Code">
				See The Code
				<i class="fa-brands fa-github"></i>
			</a>
		</header>
		<main>
			<div class="card camera-feed">
				<div class="live-badge">
					<img src="assets/icons/radio.svg" alt="">
					LIVE
				</div>
				<!-- playsinline is required for older iphones to display properly, apparently -->
				<div class="video-container">
					<div id="video-spinner" class="spinner"></div>
					<video id="video-player" autoplay muted playsinline="true"></video>
				</div>

				<button id="fullscreen-btn" class="fullscreen-button" aria-label="Fullscreen">
					<img src="assets/icons/fullscreen.svg" alt="">
				</button>

				<div class="camera-controls">
					<span id="camera-label" class="camera-label">Camera 1</span>
					<button id="switch-cam-btn" class="switch-button">Switch to Camera 2</button>
				</div>
			</div>
			<div class="metrics">
				<div class="card">
					<p class="label">
						<img src="assets/icons/thermometer.svg" alt="">
						Temperature
					</p>
					<p class="bold"><span id="temp">--</span>°F</p>
					<div class="status-indicator">
						<span id="temp-dot" class="status-dot loading"></span>
						<span id="temp-text" class="status-text">Status: --</span>
					</div>
					<a href="logs.html?metric=temperature" class="log-button">View Logs</a>
				</div>
				<div class="card">
					<p class="label">
						<img src="assets/icons/droplet.svg" alt="">
						pH Level
					</p>
					<p class="bold"><span id="ph">--</span>
					pH</p>
					<div class="status-indicator">
						<span id="ph-dot" class="status-dot loading"></span>
						<span id="ph-text" class="status-text">Status: --</span>
					</div>
					<a href="logs.html?metric=ph" class="log-button">View Logs</a>
				</div>
				<div class="card">
					<p class="label">
						<img src="assets/icons/bubbles.svg" alt="">
						<span>TDS<br><span class="sublabel">Total Dissolved Solids</span></span>
					</p>
					<p class="bold"><span id="tds">--</span>
					ppm</p>
					<div class="status-indicator">
						<span id="tds-dot" class="status-dot loading"></span>
						<span id="tds-text" class="status-text">Status: --</span>
					</div>
					<a href="logs.html?metric=tds" class="log-button">View Logs</a>
				</div>
			</div>
		</main>
		<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
		<script src="js/dashboard.js"></script>
		<script src="js/stream.js"></script>
	</body>
</html>
